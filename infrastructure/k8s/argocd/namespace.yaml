apiVersion: v1
kind: Namespace
metadata:
  name: app
---
# Верхний предел на весь неймспейс — не зависит от количества нод в кластере,
# защищает от того, чтобы один сервис вытеснил остальных с общего пула ресурсов.
# При добавлении нод сюда ничего менять не нужно; поднимать эти цифры имеет смысл,
# только если реально хотите разрешить неймспейсу использовать больше суммарных ресурсов.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: app
spec:
  hard:
    requests.cpu: "1500m"
    requests.memory: 1.5Gi
    limits.cpu: "3"
    limits.memory: 3Gi
    pods: "20"
---
# Раз в неймспейсе есть ResourceQuota на requests.cpu/requests.memory, Kubernetes
# ТРЕБУЕТ, чтобы каждый под явно указывал requests/limits — LimitRange даёт
# разумные значения по умолчанию для тех, кто их не укажет, и общий потолок/пол.
apiVersion: v1
kind: LimitRange
metadata:
  name: app-limits
  namespace: app
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 250m
        memory: 256Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
