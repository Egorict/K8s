apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "database.fullname" . }}-pv
  labels:
    type: local
    app: {{ include "database.name" . }}
spec:
  storageClassName: manual
  capacity:
    storage: {{ .Values.persistence.size }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data"