replicaCount: 1
image:
  repository: ermakov880/devops-project
  tag: 6676c363099ef6956dafdcaa9c86685b6a80b57a
  pullPolicy: Always
service:
  type: NodePort
  port: 80
  nodePort: 30081   # порт, по которому будет доступно приложение
# Ingress отключён – используем NodePort
ingress:
  enabled: false
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
livenessProbe:
  enabled: true
  path: /
  port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  enabled: true
  path: /
  port: 80
  initialDelaySeconds: 5
  periodSeconds: 5