---
- name: Install required packages (open-iscsi, nfs-common)
  become: yes
  package:
    name:
      - open-iscsi
      - nfs-common
    state: present
  when: ansible_os_family == "Debian"  # или адаптируйте под ваш дистрибутив

- name: Ensure iscsid service is running
  become: yes
  systemd:
    name: iscsid
    state: started
    enabled: yes

- name: Add Longhorn Helm repo
  shell: |
    helm repo add longhorn https://charts.longhorn.io
    helm repo update
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout or "has been updated" in helm_repo_add.stdout'

- name: Install Longhorn via Helm
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace {{ longhorn_namespace }} \
      --create-namespace \
      --version {{ longhorn_version }} \
      --set persistence.defaultClass=true \
      --set persistence.defaultClassReplicaCount=2 \
      --wait
  register: helm_install
  retries: 3
  delay: 10
  until: helm_install.rc == 0

- name: Wait for Longhorn pods to be ready
  shell: |
    kubectl wait --for=condition=ready pod --all -n {{ longhorn_namespace }} --timeout=300s
  register: longhorn_wait
  until: longhorn_wait.rc == 0
  retries: 10
  delay: 10