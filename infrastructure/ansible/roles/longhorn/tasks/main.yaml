---
- name: Install dependencies
  become: yes
  package:
    name:
      - open-iscsi
      - nfs-common
    state: present
    cache_valid_time: 3600   # кеш apt на 1 час
  when: ansible_os_family == "Debian"

- name: Start iscsid
  become: yes
  systemd:
    name: iscsid
    state: started
    enabled: yes

- name: Check if Longhorn namespace exists (to skip cleanup if absent)
  shell: kubectl get namespace longhorn-system --ignore-not-found -o name
  register: ns_check
  changed_when: false
  failed_when: false

- name: Force cleanup Longhorn (webhooks + CRDs + resources + namespace)
  shell: |
    set -e
    # 1. Удаляем вебхуки
    kubectl delete validatingwebhookconfiguration longhorn-webhook-validator --ignore-not-found --timeout=10s 2>/dev/null || true
    kubectl delete mutatingwebhookconfiguration longhorn-webhook-mutator --ignore-not-found --timeout=10s 2>/dev/null || true
    
    # 2. Удаляем финализеры у всех CRD Longhorn и сами CRD
    for crd in $(kubectl get crd -o name | grep longhorn.io); do
      kubectl patch $crd -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
      kubectl delete $crd --ignore-not-found --wait=false --timeout=10s 2>/dev/null || true
    done
    
    # 3. Удаляем все ресурсы внутри неймспейса с удалением финализеров
    for resource in $(kubectl api-resources --verbs=list --namespaced -o name | grep -E 'longhorn|volume|engine|replica'); do
      for item in $(kubectl get -n longhorn-system $resource -o name 2>/dev/null); do
        kubectl patch -n longhorn-system $item -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
        kubectl delete -n longhorn-system $item --ignore-not-found --wait=false --timeout=10s 2>/dev/null || true
      done
    done
    
    # 4. Убираем финализеры у неймспейса
    kubectl patch namespace longhorn-system -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
    
    # 5. Удаляем неймспейс с таймаутом
    timeout 30 kubectl delete namespace longhorn-system --force --grace-period=0 2>/dev/null || true
    
    # 6. Ждём максимум 20 секунд, пока неймспейс исчезнет
    for i in {1..20}; do
      if ! kubectl get namespace longhorn-system &>/dev/null; then
        echo "Namespace removed"
        break
      fi
      sleep 1
    done
  failed_when: false
  changed_when: false
  async: 90
  poll: 10
  when: ns_check.stdout != ""   # выполняем очистку только если неймспейс существует

- name: Add Longhorn repo (if not present)
  shell: |
    if ! helm repo list | grep -q longhorn; then
      helm repo add longhorn https://charts.longhorn.io
    fi
    helm repo update
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout or "has been updated" in helm_repo_add.stdout'

- name: Install Longhorn
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set persistence.defaultClass=true \
      --set persistence.defaultClassReplicaCount=1 \
      --wait --timeout 15m
  register: install
  retries: 2
  delay: 10
  until: install.rc == 0

- name: Wait for pods
  shell: kubectl wait --for=condition=ready pod --all -n longhorn-system --timeout=300s

- name: Check StorageClass
  shell: kubectl get storageclass longhorn -o name
  register: sc
  failed_when: false

- name: Result
  debug:
    msg: "Longhorn ready. Use storageClassName: longhorn"
  when: sc.rc == 0