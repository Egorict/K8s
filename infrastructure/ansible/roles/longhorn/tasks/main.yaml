- name: Add Longhorn Helm repository
  shell: |
    helm repo add longhorn https://charts.longhorn.io
    helm repo update
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout or "has been updated" in helm_repo_add.stdout'

- name: Install Longhorn via Helm (without version pinning)
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set persistence.defaultClass={{ longhorn_default_storageclass }} \
      --set persistence.defaultClassReplicaCount={{ longhorn_replica_count }} \
      --set csi.kubeletRootDir={{ longhorn_kubelet_root_dir }} \
      --set defaultSettings.defaultDataPath=/var/lib/longhorn \
      --atomic \
      --wait --timeout 15m
  register: helm_install
  retries: 3
  delay: 10
  until: helm_install.rc == 0
  changed_when: true
  when: longhorn_version is undefined or not longhorn_version

- name: Install Longhorn via Helm (with version pinning)
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set persistence.defaultClass={{ longhorn_default_storageclass }} \
      --set persistence.defaultClassReplicaCount={{ longhorn_replica_count }} \
      --version {{ longhorn_version }} \
      --set csi.kubeletRootDir={{ longhorn_kubelet_root_dir }} \
      --set defaultSettings.defaultDataPath=/var/lib/longhorn \
      --atomic \
      --wait --timeout 15m
  register: helm_install
  retries: 3
  delay: 10
  until: helm_install.rc == 0
  changed_when: true
  when: longhorn_version is defined and longhorn_version