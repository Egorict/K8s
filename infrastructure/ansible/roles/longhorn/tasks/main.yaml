---
- name: Install dependencies
  become: yes
  package:
    name:
      - open-iscsi
      - nfs-common
    state: present
  when: ansible_os_family == "Debian"

- name: Start iscsid
  become: yes
  systemd:
    name: iscsid
    state: started
    enabled: yes

- name: Force delete stuck Longhorn namespace and wait for removal
  shell: |
    kubectl delete namespace longhorn-system --force --grace-period=0 2>/dev/null || true
    while kubectl get namespace longhorn-system 2>/dev/null; do
      echo "Waiting for namespace to be removed..."
      sleep 2
    done
  failed_when: false
  changed_when: false

- name: Add Longhorn repo
  shell: helm repo add longhorn https://charts.longhorn.io && helm repo update

- name: Install Longhorn
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set persistence.defaultClass=true \
      --set persistence.defaultClassReplicaCount=1 \
      --wait --timeout 15m
  register: install
  retries: 3
  delay: 10
  until: install.rc == 0

- name: Wait for pods
  shell: kubectl wait --for=condition=ready pod --all -n longhorn-system --timeout=300s

- name: Check StorageClass
  shell: kubectl get storageclass longhorn -o name
  register: sc
  failed_when: false

- name: Result
  debug:
    msg: "Longhorn ready. Use storageClassName: longhorn"
  when: sc.rc == 0