---
- name: Install dependencies
  become: yes
  package:
    name:
      - open-iscsi
      - nfs-common
    state: present
  when: ansible_os_family == "Debian"

- name: Start iscsid
  become: yes
  systemd:
    name: iscsid
    state: started
    enabled: yes

- name: Force cleanup Longhorn (CRDs + webhooks + namespace)
  shell: |
    # Удаляем вебхуки (главная причина зависания)
    kubectl delete validatingwebhookconfiguration validator.longhorn.io --ignore-not-found 2>/dev/null || true
    kubectl delete mutatingwebhookconfiguration mutator.longhorn.io --ignore-not-found 2>/dev/null || true
    # Удаляем все CRD Longhorn
    kubectl get crd | grep longhorn.io | awk '{print $1}' | xargs -r kubectl delete crd --ignore-not-found --wait=false 2>/dev/null || true
    # Удаляем финализеры у неймспейса
    kubectl patch namespace longhorn-system -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
    # Принудительно удаляем неймспейс
    kubectl delete namespace longhorn-system --force --grace-period=0 2>/dev/null || true
    # Ждём, пока неймспейс исчезнет (максимум 30 секунд)
    for i in {1..30}; do
      if ! kubectl get namespace longhorn-system &>/dev/null; then
        echo "Namespace removed"
        break
      fi
      sleep 1
    done
  failed_when: false
  changed_when: false

- name: Add Longhorn repo
  shell: helm repo add longhorn https://charts.longhorn.io && helm repo update

- name: Install Longhorn
  shell: |
    helm upgrade --install longhorn longhorn/longhorn \
      --namespace longhorn-system --create-namespace \
      --set persistence.defaultClass=true \
      --set persistence.defaultClassReplicaCount=1 \
      --wait --timeout 15m
  register: install
  retries: 3
  delay: 10
  until: install.rc == 0

- name: Wait for pods
  shell: kubectl wait --for=condition=ready pod --all -n longhorn-system --timeout=300s

- name: Check StorageClass
  shell: kubectl get storageclass longhorn -o name
  register: sc
  failed_when: false

- name: Result
  debug:
    msg: "Longhorn ready. Use storageClassName: longhorn"
  when: sc.rc == 0