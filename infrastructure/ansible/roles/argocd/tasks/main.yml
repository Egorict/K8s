---
- name: Delete all ArgoCD resources (including global)
  shell: |
    kubectl delete -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --ignore-not-found=true 2>/dev/null || true
    kubectl delete namespace argocd --ignore-not-found=true 2>/dev/null || true
    kubectl delete crd applications.argoproj.io appprojects.argoproj.io --ignore-not-found=true 2>/dev/null || true
    kubectl delete clusterrole argocd-application-controller argocd-applicationset-controller argocd-server argocd-redis argocd-repo-server argocd-dex-server argocd-notifications-controller --ignore-not-found=true 2>/dev/null || true
    kubectl delete clusterrolebinding argocd-application-controller argocd-applicationset-controller argocd-server --ignore-not-found=true 2>/dev/null || true
    sleep 2
  changed_when: false
  failed_when: false
  when: argocd_force_reset | default(false) | bool   # только по явному запросу, не на каждом прогоне

- name: Force remove existing ArgoCD Helm release (if any)
  shell: |
    helm uninstall argocd -n argocd --ignore-not-found 2>/dev/null || true
    sleep 2
  changed_when: false
  failed_when: false
  when: argocd_force_reset | default(false) | bool

- name: Add ArgoCD Helm repo
  shell: |
    helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
    helm repo update
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout or "has been updated" in helm_repo_add.stdout'

- name: Install ArgoCD via Helm
  shell: |
    helm upgrade --install argocd argo/argo-cd \
      --namespace argocd --create-namespace \
      --set server.service.type=NodePort \
      --set server.service.nodePortHttp=30080 \
      --set server.service.nodePortHttps=30443 \
      --wait --timeout 10m --atomic
  register: argocd_install
  until: argocd_install.rc == 0
  retries: 2
  delay: 5

- name: Wait for all ArgoCD workloads to roll out
  shell: |
    set -e
    for d in $(kubectl get deployment -n argocd -o name); do
      kubectl rollout status "$d" -n argocd --timeout=300s
    done
    for s in $(kubectl get statefulset -n argocd -o name); do
      kubectl rollout status "$s" -n argocd --timeout=300s
    done
  retries: 5
  delay: 10
  register: argocd_wait
  until: argocd_wait.rc == 0
  changed_when: false

- name: Get ArgoCD admin password
  shell: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
  register: argocd_password
  changed_when: false

- name: Show ArgoCD password
  debug:
    msg: "ArgoCD admin password: {{ argocd_password.stdout }}"

- name: Delete existing StorageClass (if any) to allow recreation with new binding mode
  shell: |
    kubectl delete storageclass yc-network-hdd --ignore-not-found=true
  when: argocd_wait.rc == 0
  changed_when: false

- name: Bootstrap root Application (app of apps)
  shell: kubectl apply -f {{ playbook_dir }}/../k8s/argocd/root-app.yaml
  when: argocd_wait.rc == 0
  changed_when: true