---
- name: Delete old ArgoCD if exists
  shell: |
    kubectl delete namespace argocd --ignore-not-found 2>/dev/null || true
    kubectl delete crd applications.argoproj.io appprojects.argoproj.io applicationsets.argoproj.io --ignore-not-found 2>/dev/null || true
    sleep 5
  failed_when: false
  changed_when: false

- name: Install ArgoCD
  shell: |
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
    kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: install
  retries: 3
  delay: 10
  until: install.rc == 0

- name: Wait for ArgoCD pods
  shell: kubectl wait --for=condition=ready pod --all -n argocd --timeout=300s
  retries: 10
  delay: 10
  register: wait
  until: wait.rc == 0

- name: Get ArgoCD admin password
  shell: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
  register: password
  changed_when: false

- name: Show password
  debug:
    msg: "ArgoCD admin password: {{ password.stdout }}"