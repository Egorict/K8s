---
- name: Delete old ArgoCD if exists
  shell: |
    kubectl delete namespace argocd --ignore-not-found 2>/dev/null || true
    kubectl delete crd applications.argoproj.io appprojects.argoproj.io applicationsets.argoproj.io --ignore-not-found 2>/dev/null || true
    sleep 5
  failed_when: false
  changed_when: false

- name: Install ArgoCD
  shell: |
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
    kubectl apply -n argocd --server-side=true -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: install
  retries: 3
  delay: 10
  until: install.rc == 0

- name: Wait for ArgoCD pods (up to 10 minutes)
  shell: |
    kubectl wait --for=condition=ready pod --all -n argocd --timeout=600s 2>/dev/null || true
    kubectl get pods -n argocd
  register: pods_status
  retries: 3
  delay: 10
  until: pods_status.rc == 0
  changed_when: false

- name: Show pod status if not ready
  debug:
    msg: "{{ pods_status.stdout_lines }}"
  when: pods_status.rc != 0

- name: Force wait for critical pods (application-controller, server, repo-server)
  shell: |
    for pod in argocd-application-controller argocd-server argocd-repo-server; do
      kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=$pod -n argocd --timeout=300s 2>/dev/null || true
    done
  register: critical_wait
  until: critical_wait.rc == 0
  retries: 5
  delay: 10

- name: Get ArgoCD admin password
  shell: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
  register: password
  changed_when: false

- name: Show password
  debug:
    msg: "ArgoCD admin password: {{ password.stdout }}"