---
- name: Set KUBECONFIG environment for root (if not already)
  set_fact:
    kubeconfig_path: /root/.kube/config

- name: Wait for API server to be ready (timeout 150s)
  shell: |
    kubectl --kubeconfig {{ kubeconfig_path }} get nodes --request-timeout=3s 2>/dev/null
  register: api_check
  until: api_check.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Download Flannel manifest locally (if not exists)
  get_url:
    url: https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
    dest: /tmp/kube-flannel.yml
    timeout: 15
  register: flannel_download
  until: flannel_download is succeeded
  retries: 3
  delay: 5

- name: Install Flannel (using local manifest)
  shell: |
    kubectl apply -f /tmp/kube-flannel.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when: flannel_download is succeeded