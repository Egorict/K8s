---
- name: Read service account key JSON
  set_fact:
    sa_key_json: "{{ lookup('file', playbook_dir + '/key.json') }}"

- name: Add Yandex Cloud CSI Helm repo
  shell: |
    helm repo add yandex-s3 https://yandex-cloud.github.io/k8s-csi-s3/charts
    helm repo update
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout or "has been updated" in helm_repo_add.stdout'

- name: Install Yandex Cloud CSI driver
  shell: |
    helm upgrade --install csi-s3 yandex-s3/csi-s3 \
      --namespace kube-system \
      --create-namespace \
      --set secret.accessKey={{ yc_access_key }} \
      --set secret.secretKey={{ yc_secret_key }} \
      --set secret.bucket=my-csi-bucket \
      --wait
  register: helm_install
  retries: 3
  delay: 10
  until: helm_install.rc == 0