---
- name: Install containerd
  apt:
    name: containerd
    state: present
    update_cache: yes
    cache_valid_time: 3600  # кешируем apt на 1 час
  when: ansible_os_family == "Debian"

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Generate containerd config
  shell: |
    containerd config default > /etc/containerd/config.toml
    sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml  # не перезаписывать при повторных запусках
  register: containerd_config_created

- name: Restart containerd
  systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: containerd_config_created.changed  # перезапускать только если конфиг изменился