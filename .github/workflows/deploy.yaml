name: Build and Deploy to Kubernetes

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write
  security-events: write
  actions: read
  checks: write
  pull-requests: write
  issues: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ermakov880/devops-project
  CHART_PATH: k8s/base/myapp-chart
  VALUES_FILE: k8s/base/myapp-chart/values.yaml

jobs:
  # ============================================================
  # 1. Развернуть инфраструктуру (один раз или при изменении)
  # ============================================================
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Kubernetes cluster with Ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Установить Ansible, если его нет
            if ! command -v ansible-playbook &> /dev/null; then
              sudo apt update && sudo apt install -y ansible
            fi
            # Установить коллекцию kubernetes.core для Ansible
            ansible-galaxy collection install kubernetes.core -f

            # Клонировать репозиторий (если нет) или обновить
            if [ ! -d "DevopsProject" ]; then
              git clone https://github.com/Egorict/DevopsProject.git
            fi
            cd DevopsProject
            git pull origin master
            ls -la ansible/
            pwd
            # Запустить плейбук для установки K8s, ArgoCD, мониторинга
            ansible-playbook ansible/playbook-k8s.yaml -c local -i localhost,

  # ============================================================
  # 2. Сборка и пуш образа (только после успешной инфраструктуры)
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: deploy-infra          # ждём, пока инфраструктура развернётся
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Update Helm chart values with new image tag
        if: github.event_name == 'push'
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" ${{ env.VALUES_FILE }}
          cat ${{ env.VALUES_FILE }}

      - name: Commit and push changes to values.yaml
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.VALUES_FILE }}
          git diff --staged --quiet || git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}