name: Deploy to Kubernetes

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      longhorn_force_reset:
        description: "Force full Longhorn reinstall (destructive! wipes existing volumes)"
        type: boolean
        default: false
      argocd_force_reset:
        description: "Force full ArgoCD reinstall (destructive! drops sync state)"
        type: boolean
        default: false

env:
  SERVER_IMAGE_NAME: ermakov880/devops-project-server
  SERVER_VALUES_FILE: infrastructure/k8s/base/server-chart/values.yaml
  CLIENT_IMAGE_NAME: ermakov880/devops-project
  CLIENT_VALUES_FILE: infrastructure/k8s/base/myapp-chart/values.yaml

jobs:
  # 0. Определяем, что именно поменялось в пуше — от этого зависит,
  #    какие из независимых джоб ниже вообще нужно запускать.
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/ansible/**'
            app:
              - 'apps/**'

  # 1. Инфраструктура кластера (Ansible). Запускается ТОЛЬКО если менялись
  #    файлы в infrastructure/ansible/**, либо если запущено вручную.
  #    Больше не выполняется на каждый пуш с правкой в коде приложения.
  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy K8s infrastructure via Ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v ansible-playbook &> /dev/null; then
              sudo apt update && sudo apt install -y ansible
            fi
            ansible-galaxy collection install kubernetes.core -f
            if [ ! -d "K8s" ]; then
              git clone https://github.com/Egorict/K8s.git K8s
            fi
            cd K8s
            git pull origin master
            ansible-playbook infrastructure/ansible/playbook.yaml -c local -i localhost, ${{ github.event.inputs.longhorn_force_reset == 'true' && '-e longhorn_force_reset=true' || '' }} ${{ github.event.inputs.argocd_force_reset == 'true' && '-e argocd_force_reset=true' || '' }}

  # 2. Сборка образов и обновление Helm-чарта. Запускается ТОЛЬКО если менялся
  #    код приложения (apps/**), и НЕ зависит от джобы infra — они полностью
  #    независимы и могут идти в разных пушах, не блокируя друг друга.
  build:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Добавляем настройку Buildx с кешем
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/client
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE_NAME }}:latest
            ${{ env.CLIENT_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE_NAME }}:latest
            ${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update values.yaml files with new tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" ${{ env.SERVER_VALUES_FILE }}
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" ${{ env.CLIENT_VALUES_FILE }}
          echo "=== Server values ===" && cat ${{ env.SERVER_VALUES_FILE }}
          echo "=== Client values ===" && cat ${{ env.CLIENT_VALUES_FILE }}

      - name: Commit and push changes to values.yaml
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.SERVER_VALUES_FILE }}
          git add ${{ env.CLIENT_VALUES_FILE }}
          git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
