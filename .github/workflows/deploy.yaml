name: Deploy to Kubernetes

on:
  push:
    branches: [ master, main ]

env:
  IMAGE_NAME: ermakov880/devops-project
  VALUES_FILE: k8s/base/myapp-chart/values.yaml

jobs:
  # 1. Развернуть инфраструктуру (один раз или при изменениях)
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy K8s infrastructure via Ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if ! command -v ansible-playbook &> /dev/null; then
              sudo apt update && sudo apt install -y ansible
            fi
            ansible-galaxy collection install kubernetes.core -f
            if [ ! -d "K8s" ]; then
              git clone https://github.com/Egorict/K8s.git K8s
            fi
            cd K8s
            git pull origin master
            ansible-playbook ansible/playbook.yaml -c local -i localhost,

  # 2. Сборка образа и обновление Helm-чарта
  build:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update values.yaml with new tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" ${{ env.VALUES_FILE }}
          cat ${{ env.VALUES_FILE }}

      - name: Commit and push changes to values.yaml
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.VALUES_FILE }}
          git diff --staged --quiet || git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}   # используем PAT для пуша