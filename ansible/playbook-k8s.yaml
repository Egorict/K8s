---
- name: Minimal Kubernetes setup with kubeadm + containerd + ArgoCD (Helm)
  hosts: all
  become: yes
  vars:
    kubernetes_version: "1.28"
    pod_network_cidr: "10.244.0.0/16"
    user_name: "user"

  tasks:
    # Подготовка системы
    - name: Disable swap
      command: swapoff -a
    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        replace: ''
    - name: Load kernel modules
      shell: |
        modprobe overlay
        modprobe br_netfilter
    - name: Set sysctl params
      shell: |
        cat <<EOF > /etc/sysctl.d/k8s.conf
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
        EOF
        sysctl --system

    # containerd
    - name: Install containerd
      apt:
        name: containerd
        state: present
    - name: Configure containerd
      shell: |
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    # Kubernetes компоненты
    - name: Add Kubernetes apt repo
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
        apt update
    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present

    # Инициализация кластера
    - name: Initialize cluster
      shell: |
        kubeadm init --pod-network-cidr={{ pod_network_cidr }} --cri-socket unix:///run/containerd/containerd.sock
      args:
        creates: /etc/kubernetes/admin.conf

    # Настройка доступа для root
    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy admin.conf to root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: yes
        owner: root
        group: root
        mode: '0600'

    # Настройка доступа для пользователя user
    - name: Create .kube directory for user
      file:
        path: "/home/{{ user_name }}/.kube"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0755'

    - name: Copy admin.conf to user's home
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ user_name }}/.kube/config"
        remote_src: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: '0600'

    - name: Set KUBECONFIG for user in .bashrc
      lineinfile:
        path: "/home/{{ user_name }}/.bashrc"
        line: 'export KUBECONFIG=/home/{{ user_name }}/.kube/config'
        create: yes
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

    # CNI (Flannel)
    - name: Install Flannel
      shell: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    # Разрешить поды на control-plane (single node)
    - name: Allow pods on control plane
      shell: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: yes

    # Helm
    - name: Install Helm
      shell: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 get_helm.sh
        ./get_helm.sh
      args:
        creates: /usr/local/bin/helm

    # ArgoCD (установка через Helm)
    - name: Remove old ArgoCD namespace if exists
      shell: |
        kubectl delete namespace argocd --ignore-not-found=true
        sleep 5
      changed_when: false

    - name: Add ArgoCD Helm repo
      shell: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update

    - name: Install ArgoCD via Helm
      shell: |
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --set server.service.type=NodePort \
          --set server.service.nodePortHttp=30080 \
          --set server.service.nodePortHttps=30443
      register: argocd_install
      until: argocd_install.rc == 0
      retries: 3
      delay: 10

    - name: Wait for ArgoCD server pod
      shell: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s
      retries: 10
      delay: 10
      register: argocd_wait
      until: argocd_wait.rc == 0

    - name: Get ArgoCD admin password
      shell: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false

    - name: Show ArgoCD password
      debug:
        msg: "ArgoCD admin password: {{ argocd_password.stdout }}"

    # Применяем ArgoCD Application (предварительно создайте файл в репозитории)
    - name: Apply ArgoCD Application
      shell: kubectl apply -f https://raw.githubusercontent.com/Egorict/K8s/main/k8s/argocd/application.yaml
      ignore_errors: yes